name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:
  # pubs.yml commits with GITHUB_TOKEN, whose pushes do NOT trigger
  # `on: push` workflows -- chain off its completion instead so the
  # weekly ORCID sync still rebuilds the publications page.
  workflow_run:
    workflows: ["Build publications"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # workflow_run must build main as of after the pubs commit
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx @11ty/eleventy
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
